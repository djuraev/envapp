# k8s/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: envapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: envapp
  template:
    metadata:
      labels:
        app: envapp
    spec:
      containers:
      - name: envapp
        image: abradox/envapp:1.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: APP_ENV
          value: "production"
        - name: APP_VERSION
          value: "1.0"
        - name: APP_COLOR
          value: "GREEN"
        - name: DB_HOST
          value: "postgres.default.svc.cluster.local"
        - name: DB_PORT
          value: "999999"
        - name: DB_NAME
          value: "mydb-stg"
        - name: FEATURE_FLAGS
          value: "light-mode,new-dashboard"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
