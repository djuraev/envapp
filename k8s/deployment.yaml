# k8s/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: envapp
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: envapp
  template:
    metadata:
      labels:
        app: envapp
    spec:
      containers:
      - name: envapp
        image: abradox/envapp:1.3
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secret
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
