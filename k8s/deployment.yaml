apiVersion: apps/v1
kind: Deployment
metadata:
  name: envapp
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: envapp
  template:
    metadata:
      labels:
        app: envapp
    spec:
      containers:
      - name: envapp
        image: abradox/envapp:1.3
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: APP_ENV
          value: "production"
        - name: APP_VERSION
          value: "1.0"
        - name: APP_COLOR
          value: "blue"
        - name: DB_HOST
          value: "postgres.default.svc.cluster.local"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "mydb"
        - name: FEATURE_FLAGS
          value: "dark-mode,new-dashboard"
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
